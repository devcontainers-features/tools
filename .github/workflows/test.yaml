name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Check shell script syntax"
        run: |
          bash -n src/atlas/install.sh
          bash -n src/psql/install.sh
          bash -n src/gum/install.sh
          bash -n src/nvim/install.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Test atlas feature"
        run: devcontainer features test -f atlas -i mcr.microsoft.com/devcontainers/base:ubuntu .

      - name: "Test psql feature"
        run: devcontainer features test -f psql -i mcr.microsoft.com/devcontainers/base:ubuntu .

      - name: "Test gum feature"
        run: devcontainer features test -f gum -i mcr.microsoft.com/devcontainers/base:ubuntu .

      - name: "Test nvim feature"
        run: devcontainer features test -f nvim -i mcr.microsoft.com/devcontainers/base:ubuntu .
